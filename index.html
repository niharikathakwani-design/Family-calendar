<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Family Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ CSS MUST be linked here -->
  <link rel="stylesheet" href="style.v2.css">
</head>
<body>

  <h1>👨‍👩‍👧‍👦 Family Calendar</h1>

  <section class="event-form">
    <h2>Add Event</h2>
    <input id="title" placeholder="Event title">
    <input id="date" type="date">
    <input id="person" placeholder="Who is it for?">
    <textarea id="notes" placeholder="Notes (optional)"></textarea>
    <button id="addBtn">Add Event</button>
  </section>

  <section class="events">
    <h2>Upcoming Events</h2>
    <ul id="eventList"></ul>
  </section>

  <!-- ✅ JS MUST be loaded here -->
  <script src="script.js?v=20260409"></script>

</body>
</html>
