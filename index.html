<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Family Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ CSS MUST be linked here -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>👨‍👩‍👧‍👦 Family Calendar</h1>

  <section class="data-actions">
  <h2>Share / Backup</h2>

  <button onclick="exportEvents()">Export Events</button>

  <input type="file" id="importFile" accept=".json" />
  <button onclick="importEvents()">Import Events</button>
</section>

  <section class="events">
    <h2>Upcoming Events</h2>
    <ul id="eventList"></ul>
  </section>

  <!-- ✅ JS MUST be loaded here -->
  <script src="script.js?v=20260409"></script>

</body>
</html>
